name: Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest

    steps:
    - name: Check out code
      uses: actions/checkout@ff7abcd0c3c05ccf6adc123a8cd1fd4fb30fb493  # v4

    - name: Set up Go
      uses: actions/setup-go@e75c3e80bcde46e322cd5845ae46582947c9becd  # v5

    - name: Cache Go modules
      uses: actions/cache@638ed79f9dc94c1de1baef91bcab5edaa19451f4  # v4
      with:
        path: ~/go/pkg/mod
        key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
        restore-keys: |
          ${{ runner.os }}-go-

    - name: Download dependencies
      run: go mod download

    - name: Run tests
      run: go test -v -race -coverprofile=coverage.out ./...

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        file: ./coverage.out
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false

  build:
    name: Build CLI tool
    runs-on: ubuntu-latest

    steps:
    - name: Check out code
      uses: actions/checkout@ff7abcd0c3c05ccf6adc123a8cd1fd4fb30fb493  # v4

    - name: Set up Go
      uses: actions/setup-go@e75c3e80bcde46e322cd5845ae46582947c9becd  # v5

    - name: Build CLI tool
      run: |
        cd cmd/geojson2sosi
        go build -v .

    - name: Test CLI tool
      run: |
        cd cmd/geojson2sosi
        # Test that the CLI binary is built correctly by checking version display and error handling
        ./geojson2sosi 2>&1 | grep -q "missing required input file" && echo "CLI tool built and runs correctly"